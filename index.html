<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PARADIGM.0G - Secure Upload/Download</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@0glabs/0g-ts-sdk@latest/dist/browser/index.js"></script>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
    button { padding: 10px; margin: 10px; background: #00ff9d; color: #000; border: none; cursor: pointer; }
    input { padding: 10px; margin: 10px; }
    #status, #inftStatus { color: #00ff9d; margin: 20px; }
  </style>
</head>
<body>
  <h1>PARADIGM.0G Mainnet Storage</h1>
  <button onclick="connectWallet()">Connect Wallet</button>
  <p id="wallet">Not Connected</p>

  <div id="inftStatus">Verifying iNFTs #1-4...</div>

  <h2>Upload File to 0G Mainnet</h2>
  <input type="file" id="fileInput" />
  <button onclick="uploadFile()">Upload</button>

  <h2>Download File from 0G Mainnet</h2>
  <input type="text" id="rootHash" placeholder="Enter Root Hash" />
  <button onclick="downloadFile()">Download</button>

  <div id="status">Ready</div>

<script type="module">
  import { Indexer, ZgFile } from '@0glabs/0g-ts-sdk/browser';

  const CONTRACT_ADDR = '0x57e463BF845cf328715446b9246fFa536B671A10';
  const TOKEN_IDS = ['1', '2', '3', '4'];
  const OWNER_WALLET = '0x6F4D829488686afd8D9B68AE56986C312784C0e6';

  const RPC = 'https://evmrpc.0g.ai';
  const STORAGE_RPC = 'https://indexer-storage-turbo.0g.ai';

  let provider, signer, indexer;

  async function connectWallet() {
    if (!window.ethereum) return alert('Install MetaMask!');
    await window.ethereum.request({ method: 'eth_requestAccounts' });
    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();
    const address = await signer.getAddress();
    document.getElementById('wallet').innerText = `Connected: \( {address.slice(0,6)}... \){address.slice(-4)}`;
    indexer = new Indexer(STORAGE_RPC);
    bakeAllINFTs();
  }

  async function bakeAllINFTs() {
    const readProvider = new ethers.providers.JsonRpcProvider(RPC);
    const abi = ['function ownerOf(uint256) view returns (address)'];
    const contract = new ethers.Contract(CONTRACT_ADDR, abi, readProvider);
    const statusDiv = document.getElementById('inftStatus');
    let bakedCount = 0;
    for (const id of TOKEN_IDS) {
      try {
        const owner = await contract.ownerOf(id);
        if (owner.toLowerCase() === OWNER_WALLET.toLowerCase()) bakedCount++;
      } catch (error) {
        console.error(`Error verifying iNFT #\( {id}: \){error.message}`);
      }
    }
    statusDiv.innerText = bakedCount === 4 ? 'All 4 iNFTs Verified and Baked ✅ (Quantum Sigs Active)' : `Only ${bakedCount} iNFTs Verified`;
  }

  async function uploadFile() {
    if (!signer) return alert('Connect wallet first');
    const file = document.getElementById('fileInput').files[0];
    if (!file) return alert('Select a file');
    const status = document.getElementById('status');
    status.innerText = 'Uploading to 0G Mainnet...';

    try {
      const zgFile = await ZgFile.fromFile(file);
      const [tree, treeErr] = await zgFile.merkleTree();
      if (treeErr) throw treeErr;
      const [tx, uploadErr] = await indexer.upload(zgFile, RPC, signer);
      if (uploadErr) throw uploadErr;
      await tx.wait();
      status.innerText = `Uploaded! Tx Hash: \( {tx.hash}\nRoot Hash: \){tree.rootHash()}\nUse this Root Hash for download and Content Hash.`;
    } catch (e) {
      status.innerText = `Error: ${e.message}`;
    }
  }

  async function downloadFile() {
    const root = document.getElementById('rootHash').value.trim();
    if (!root) return alert('Enter Root Hash');
    const status = document.getElementById('status');
    status.innerText = 'Downloading from 0G Mainnet...';

    try {
      const [data, err] = await indexer.download(root);
      if (err) throw err;
      const blob = new Blob([data]);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '0g-downloaded-file';
      a.click();
      URL.revokeObjectURL(url);
      status.innerText = 'Download Complete!';
    } catch (e) {
      status.innerText = `Error: ${e.message}`;
    }
  }

  window.addEventListener('load', bakeAllINFTs);
</script>
</body>
</html>
