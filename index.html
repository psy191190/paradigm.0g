<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradigm.0G Storage Hub</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 3em;
            margin: 0;
            text-shadow: 0 0 20px #00ffea, 0 0 40px #00ffea;
            animation: neon 2s infinite alternate;
        }
        @keyframes neon {
            from { text-shadow: 0 0 10px #00ffea, 0 0 20px #00ffea, 0 0 30px #00ffea; }
            to { text-shadow: 0 0 20px #00ffea, 0 0 40px #00ffea, 0 0 60px #00ffea; }
        }
        .container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(0, 255, 234, 0.3);
            margin: 20px;
        }
        button {
            background: #00ffea;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px 0;
            transition: 0.3s;
        }
        button:hover {
            background: #00b39f;
            box-shadow: 0 0 20px #00ffea;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        #status {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }
        footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <header>
        <h1>PARADIGM.0G</h1>
        <p>Decentralized Storage Upload & Download on Aristotle Mainnet</p>
    </header>

    <div class="container">
        <button id="connectWallet">Connect Wallet</button>
        <p id="walletStatus">Wallet: Not connected</p>

        <h2>Upload File</h2>
        <input type="file" id="fileInput" />
        <button id="uploadBtn" disabled>Upload to 0G Storage</button>
        <p>Uploads commit to chain (gas fees apply via your wallet).</p>

        <h2>Download File</h2>
        <input type="text" id="rootHash" placeholder="Enter Merkle Root Hash" />
        <button id="downloadBtn">Download File</button>

        <div id="status"></div>
    </div>

    <footer>&copy; 2025 Paradigm.0G - Powered by 0G Aristotle Mainnet</footer>

    <script src="https://cdn.jsdelivr.net/npm/viem@2.x/viem.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/modal@2.x"></script>
    <script type="module">
        import { createClient, http } from 'viem';
        import { walletConnect } from 'viem/connectors';

        const projectId = 'YOUR_WALLETCONNECT_PROJECT_ID'; // Get free at https://cloud.walletconnect.com

        const modal = new WalletConnectModal({ projectId });

        const connector = walletConnect({ projectId });

        let client;
        let account;

        const chain = {
            id: 16661, // 0G Aristotle Mainnet chain ID
            name: '0G Aristotle',
            nativeCurrency: { name: '0G', symbol: '0G', decimals: 18 },
            rpcUrls: { default: { http: ['https://evmrpc.0g.ai'] } },
        };

        // Hard-coded mainnet addresses
        const FLOW_CONTRACT = '0x62D4144dB0F0a6fBBaeb6296c785C71B3D57C526'; // Storage Flow
        const STORAGE_INDEXER = 'https://indexer-storage-mainnet.0g.ai'; // Update if separate standard/turbo

        document.getElementById('connectWallet').onclick = async () => {
            try {
                await modal.open();
                const session = await connector.connect({ chainId: chain.id });

                client = createClient({
                    chain,
                    transport: http(),
                    account: session.accounts[0],
                });

                account = session.accounts[0];
                document.getElementById('walletStatus').textContent = `Wallet: \( {account.slice(0,6)}... \){account.slice(-4)}`;
                document.getElementById('uploadBtn').disabled = false;
                setStatus('Wallet connected!');
            } catch (err) {
                setStatus('Connection failed: ' + err.message);
            }
        };

        function setStatus(msg) {
            document.getElementById('status').textContent = msg;
        }

        // Upload Logic (uses 0G Storage SDK concepts - simplified with direct flow interaction)
        document.getElementById('uploadBtn').onclick = async () => {
            if (!client) return setStatus('Connect wallet first');

            const file = document.getElementById('fileInput').files[0];
            if (!file) return setStatus('Select a file');

            setStatus('Preparing upload...');

            // Read file, compute Merkle root (simplified - real impl needs @0gstorage/client or full merkle)
            const arrayBuffer = await file.arrayBuffer();
            const uint8 = new Uint8Array(arrayBuffer);

            // Placeholder: In real use, integrate full 0G TS SDK for proper segmentation & upload
            setStatus('Upload requires full 0G Storage SDK integration. Clone https://github.com/0glabs/0g-storage-web-starter-kit for complete drag-drop UI with fees & WalletConnect.');

            // Example tx to Flow contract (actual upload uses off-chain to nodes + on-chain commit)
            // const hash = await client.sendTransaction({ to: FLOW_CONTRACT, data: '0x...' });
            // setStatus(`Uploaded! Tx: ${hash}`);
        };

        document.getElementById('downloadBtn').onclick = async () => {
            const root = document.getElementById('rootHash').value.trim();
            if (!root) return setStatus('Enter root hash');

            // Download via gateway (decentralized retrieval)
            const gatewayUrl = `https://gateway.0g.ai/storage/${root}`;
            window.open(gatewayUrl, '_blank');
            setStatus('Download initiated via gateway (if file exists)');
        };
    </script>
</body>
</html>
